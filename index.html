  <script>
    /* ============================================================
       CONFIGURAÇÃO PADRÃO
    ============================================================ */
    const SUBSCRIPTION_KEY_PADRAO = "";
    const SERVICE_REGION_PADRAO   = "";

    /* ============================================================
       VARIÁVEIS DE ESTADO
    ============================================================ */
    let reconhecedor  = null;
    let textoFinal    = "";
    let textoParcial  = "";
    let estaEscutando = false;

    /* ── Referências a elementos do DOM ─────────────────────── */
    const textarea      = document.getElementById("textoReconhecido");
    const statusDot     = document.getElementById("statusDot");
    const statusTexto   = document.getElementById("statusTexto");
    const statusWrapper = document.getElementById("statusWrapper");
    const btnIniciar    = document.getElementById("btnIniciar");
    const btnParar      = document.getElementById("btnParar");
    const charCount     = document.getElementById("charCount");
    const alertaErro    = document.getElementById("alertaErro");

    /* ============================================================
       FUNÇÕES AUXILIARES DE UI
    ============================================================ */
    function atualizarContador(texto) {
      charCount.textContent = texto.length + " chars";
    }

    function renderizarTexto() {
      const exibir = textoFinal
        + (textoParcial ? "\n[…] " + textoParcial : "");
      textarea.value = exibir;
      atualizarContador(exibir);
      textarea.scrollTop = textarea.scrollHeight;
    }

    function ativarStatusEscutando() {
      statusDot.classList.add("listening");
      statusTexto.classList.add("listening");
      statusWrapper.classList.add("listening");
      statusTexto.textContent = "ESCUTANDO...";
      textarea.classList.add("listening-active");
    }

    function restaurarStatusParado() {
      statusDot.classList.remove("listening");
      statusTexto.classList.remove("listening");
      statusWrapper.classList.remove("listening");
      statusTexto.textContent = "PARADO";
      textarea.classList.remove("listening-active");
    }

    function mostrarErro(msg) {
      alertaErro.textContent = msg;
      alertaErro.style.display = "block";
    }

    function ocultarErro() {
      alertaErro.style.display = "none";
      alertaErro.textContent   = "";
    }

    function limparTexto() {
      textoFinal   = "";
      textoParcial = "";
      renderizarTexto();
    }

    /* ============================================================
       INICIAR RECONHECIMENTO
    ============================================================ */
    function iniciarReconhecimento() {
      ocultarErro();

      const chave  = document.getElementById("inputKey").value.trim()
                     || SUBSCRIPTION_KEY_PADRAO;
      const regiao = document.getElementById("inputRegion").value.trim()
                     || SERVICE_REGION_PADRAO;

      if (!chave || !regiao) {
        mostrarErro("⚠️ Preencha a Azure Speech Key e a Região antes de iniciar.");
        return;
      }

      limparTexto();

      const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(chave, regiao);
      speechConfig.speechRecognitionLanguage = "pt-BR";

      const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();

      reconhecedor = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

      reconhecedor.recognizing = (sender, evento) => {
        textoParcial = evento.result.text;
        renderizarTexto();
      };

      reconhecedor.recognized = (sender, evento) => {
        if (
          evento.result.reason === SpeechSDK.ResultReason.RecognizedSpeech &&
          evento.result.text.trim() !== ""
        ) {
          textoFinal  += (textoFinal ? " " : "") + evento.result.text.trim();
          textoParcial = "";
          renderizarTexto();
        }
      };

      reconhecedor.canceled = (sender, evento) => {
        const motivo = evento.reason === SpeechSDK.CancellationReason.Error
          ? `Erro: ${evento.errorDetails}`
          : "Reconhecimento cancelado.";
        mostrarErro("❌ " + motivo);
        pararReconhecimento();
      };

      reconhecedor.sessionStopped = () => {
        restaurarStatusParado();
        estaEscutando = false;
      };

      reconhecedor.startContinuousRecognitionAsync(
        () => {
          estaEscutando = true;
          ativarStatusEscutando();
          btnIniciar.disabled = true;
          btnParar.disabled   = false;
        },
        (erro) => {
          mostrarErro("❌ Não foi possível iniciar o reconhecimento: " + erro);
        }
      );
    }

    /* ============================================================
       PARAR RECONHECIMENTO
    ============================================================ */
    function pararReconhecimento() {
      if (!reconhecedor) return;

      reconhecedor.stopContinuousRecognitionAsync(
        () => {
          estaEscutando       = false;
          textoParcial        = "";
          renderizarTexto();
          restaurarStatusParado();
          btnIniciar.disabled = false;
          btnParar.disabled   = true;
          reconhecedor.close();
          reconhecedor = null;
        },
        (erro) => {
          mostrarErro("⚠️ Erro ao parar o reconhecimento: " + erro);
        }
      );
    }

    /* ============================================================
